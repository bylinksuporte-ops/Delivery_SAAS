version: '3.9'

services:
  # ── Banco de dados ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: delivery_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: delivery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: delivery_dev
    ports:
      - '127.0.0.1:5433:5432'   # só localhost, não expõe para fora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U delivery -d delivery_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: delivery_redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'   # só localhost
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Fastify) ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: delivery_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://delivery:${POSTGRES_PASSWORD}@postgres:5432/delivery_dev
      REDIS_URL: redis://redis:6379
    ports:
      - '127.0.0.1:3333:3333'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3333/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web Admin (Next.js) ────────────────────────────────────────────
  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    container_name: delivery_web_admin
    restart: unless-stopped
    depends_on:
      - api
    env_file: apps/web-admin/.env.local
    ports:
      - '127.0.0.1:3000:3000'

  # ── Web Store (Next.js) ────────────────────────────────────────────
  web-store:
    build:
      context: .
      dockerfile: apps/web-store/Dockerfile
    container_name: delivery_web_store
    restart: unless-stopped
    depends_on:
      - api
    env_file: apps/web-store/.env.local
    ports:
      - '127.0.0.1:3001:3001'

  # ── Nginx (proxy reverso + SSL) ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: delivery_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - web-admin
      - web-store

volumes:
  postgres_data:
  redis_data:
