events { worker_connections 1024; }

http {
  # Redireciona tudo de HTTP para HTTPS
  server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # API
  server {
    listen 443 ssl;
    server_name api.SEU_DOMINIO.com;

    ssl_certificate     /etc/letsencrypt/live/api.SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.SEU_DOMINIO.com/privkey.pem;

    location / {
      proxy_pass http://api:3333;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
    }
  }

  # Admin
  server {
    listen 443 ssl;
    server_name admin.SEU_DOMINIO.com;

    ssl_certificate     /etc/letsencrypt/live/admin.SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.SEU_DOMINIO.com/privkey.pem;

    location / {
      proxy_pass http://web-admin:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Loja (cliente)
  server {
    listen 443 ssl;
    server_name loja.SEU_DOMINIO.com;

    ssl_certificate     /etc/letsencrypt/live/loja.SEU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loja.SEU_DOMINIO.com/privkey.pem;

    location / {
      proxy_pass http://web-store:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
