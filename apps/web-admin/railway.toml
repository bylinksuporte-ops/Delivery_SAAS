[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo run build --filter=@delivery/web-admin..."

[deploy]
startCommand = "pnpm --filter @delivery/web-admin start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
